<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- プレミアム感のあるフォントを採用 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="app">
        <!-- スタート画面 -->
        <div id="start-screen" class="screen active">
            <h1 class="game-title"><span>S</span>PEED</h1>
            <p class="subtitle">タップでスピード勝負！</p>
            <div class="difficulty-select">
                <p>COMの強さレベル</p>
                <div class="difficulty-options">
                    <button class="diff-btn" data-level="1">弱い</button>
                    <button class="diff-btn selected" data-level="2">普通</button>
                    <button class="diff-btn" data-level="3">強い</button>
                    <button class="diff-btn" data-level="4">最強</button>
                </div>
            </div>
            <div class="color-select">
                <p>あなたのカードの色</p>
                <div class="color-options">
                    <button class="color-btn red-btn selected" data-color="red">レッド (♥♦)</button>
                    <button class="color-btn black-btn" data-color="black">ブラック (♠♣)</button>
                </div>
            </div>
            <button id="start-btn" class="primary-btn">GAME START</button>
        </div>

        <!-- ゲーム画面 -->
        <div id="game-screen" class="screen hidden">
            <!-- CPU 領域 -->
            <div id="cpu-area" class="player-area cpu-area">
                <div class="player-info">
                    <span class="player-name">COMPUTER</span>
                    <span class="deck-count">山札: <span id="cpu-deck-count">23</span></span>
                </div>
                <div class="hand-area">
                    <div class="card-slot" id="cpu-hand-0"></div>
                    <div class="card-slot" id="cpu-hand-1"></div>
                </div>
                <!-- CPU ペナルティオーバーレイ -->
                <div id="cpu-penalty" class="penalty-overlay hidden">
                    <span class="penalty-time">5</span>
                </div>
            </div>

            <!-- 中央の場 -->
            <div id="center-area" class="center-area">
                <div class="card-slot center-slot" id="center-0"></div>
                <div class="card-slot center-slot" id="center-1"></div>
                <!-- 自動補充時のアナウンス用 -->
                <div id="stuck-message" class="stuck-message hidden">手詰まり - 自動補充</div>
            </div>

            <!-- プレイヤー領域 -->
            <div id="player-area" class="player-area">
                <!-- プレイヤー ペナルティオーバーレイ -->
                <div id="player-penalty" class="penalty-overlay hidden">
                    <span class="penalty-time">5</span>
                </div>
                <div class="hand-area">
                    <div class="card-slot playable" id="player-hand-0"></div>
                    <div class="card-slot playable" id="player-hand-1"></div>
                </div>
                <div class="player-info user-info">
                    <span class="player-name">YOU</span>
                    <span class="deck-count">山札: <span id="player-deck-count">23</span></span>
                </div>
            </div>

            <!-- カウントダウン（3, 2, 1, START） -->
            <div id="countdown-overlay" class="countdown-overlay hidden">
                <div id="countdown-text" class="countdown-text">3</div>
            </div>
        </div>

        <!-- リザルト画面 -->
        <div id="result-screen" class="screen hidden">
            <h2 id="result-title" class="result-title">YOU WIN!</h2>
            <div class="result-stats">
                <p>COMの強さ: <span id="result-diff">普通</span></p>
                <div class="score">
                    <p>あなたの山札残り: <span id="res-player-deck">0</span></p>
                    <p>COMの山札残り: <span id="res-cpu-deck">0</span></p>
                </div>
            </div>
            <button id="retry-btn" class="primary-btn">もう一度あそぶ</button>
            <button id="back-btn" class="secondary-btn">タイトルへ</button>
        </div>
    </div>

    <!-- カードテンプレート (JSでクローンして使用) -->
    <template id="card-template">
        <div class="playing-card">
            <div class="card-inner">
                <div class="card-front">
                    <div class="card-number top-left"></div>
                    <div class="card-suit center-suit"></div>
                    <div class="card-number bottom-right"></div>
                </div>
                <div class="card-back">
                    <div class="card-pattern"></div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
